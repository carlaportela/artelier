name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/artelier"

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run build
        env:
          SKIP_ENV_VALIDATION: true
